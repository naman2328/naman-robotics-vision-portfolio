<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman Sharma | Robotics & Vision Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060912;
  --panel: #0b1120;
  --panel-2: #111827;
  --ink: #e7eef7;
  --muted: #8a9aae;
  --faint: #536173;
  --cyan: #00d9ff;
  --orange: #ff7a3d;
  --green: #00f091;
  --purple: #8b5cf6;
  --line: rgba(0, 217, 255, 0.16);
  --line-strong: rgba(0, 217, 255, 0.34);
  --shadow: 0 24px 90px rgba(0, 0, 0, 0.35);
  --font-display: "Syne", sans-serif;
  --font-body: "Instrument Sans", sans-serif;
  --font-mono: "JetBrains Mono", monospace;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at 10% 0%, rgba(0, 217, 255, 0.12), transparent 34rem),
    radial-gradient(circle at 95% 18%, rgba(255, 122, 61, 0.09), transparent 32rem),
    var(--bg);
  font-family: var(--font-body);
  line-height: 1.6;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 217, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 217, 255, 0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: linear-gradient(to bottom, black, transparent 78%);
  pointer-events: none;
  z-index: 0;
}

a {
  color: inherit;
}

#field {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0.28;
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative;
  z-index: 1;
}

.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  background: rgba(6, 9, 18, 0.82);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(22px);
}

.brand {
  font-family: var(--font-mono);
